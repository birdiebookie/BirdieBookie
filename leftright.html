<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Left Right - BirdieBookie</title>
<link rel="stylesheet" href="style.css">

<style>

.setup-box{
max-width:1000px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:20px;
}

.option-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

.option-card{
background:rgba(255,255,255,.04);
padding:20px;
border-radius:16px;
}

.option-card select{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-size:16px;
}

.rules-box{
margin-top:40px;
background:rgba(68,255,136,.08);
padding:30px;
border-radius:20px;
}

.rules-box ul{
line-height:2;
}

.degenerate-box{
margin-top:35px;
padding:20px;
border-radius:18px;
background:rgba(255,140,0,.12);
border:1px solid rgba(255,140,0,.35);
text-align:center;
}

.degenerate-title{
font-size:20px;
font-weight:bold;
margin-bottom:12px;
color:#ffb347;
}

.degenerate-emojis{
font-size:34px;
letter-spacing:4px;
margin-bottom:12px;
}

.degenerate-text{
font-size:16px;
opacity:.9;
line-height:1.6;
}

</style>

</head>
