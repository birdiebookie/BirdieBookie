<style>

.chips-box{
max-width:1000px;
margin:auto;
}

.dropdown-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.dropdown-card{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:16px;
}

.dropdown-card h3{
margin-bottom:12px;
}

.dropdown-card select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
font-size:16px;
}

.summary-box{
margin-top:40px;
background:rgba(68,255,136,.08);
padding:25px;
border-radius:18px;
text-align:center;
}

.rules-box{
margin-top:30px;
background:rgba(255,255,255,.04);
padding:25px;
border-radius:18px;
}

.rules-box ul{
line-height:2;
}
