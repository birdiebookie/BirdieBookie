<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirdieBookie - Invite Players</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

.wrap{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

h1{
    color:#00ff99;
    text-align:center;
    font-size:52px;
}

.panel{
    border:2px solid #00ff99;
    border-radius:14px;
    padding:18px;
    margin-bottom:22px;
}

h2{
    color:#00ff99;
    margin:0 0 16px;
}

.grid3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
}

input[type="text"]{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:2px solid #00ff99;
    background:#111;
    color:#fff;
    font-size:18px;
    box-sizing:border-box;
}

.playerRow{
    display:grid;
    grid-template-columns:180px 1fr 1fr;
    gap:18px;
    align-items:center;
    border:2px solid #00ff99;
    border-radius:12px;
    padding:18px;
    margin:16px 0;
}

.playerTitle{
    font-size:30px;
    color:#00ff99;
    font-weight:bold;
}

/* TOGGLE BUTTON STYLES */
.toggle-row {
    display:flex;
    align-items:center;
    gap:18px;
    margin:24px 0;
    cursor:pointer;
}

.toggle-box {
    width:60px;
    height:60px;
    border-radius:12px;
    border:3px solid #00ff99;
    background:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    flex-shrink:0;
    transition: background 0.2s;
}

.toggle-box.on {
    background:#00ff99;
    color:#000;
}

.toggle-label {
    font-size:28px;
    font-weight:bold;
    color:#00ff99;
}

#extra{
    display:none;
}

button{
    width:100%;
    padding:18px;
    font-size:30px;
    font-weight:bold;
    background:#00ff99;
    color:#000;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin-top:10px;
}
@media (max-width:700px){
    .grid3{
        grid-template-columns:1fr;
    }
    .playerRow{
        grid-template-columns:1fr;
        gap:10px;
        padding:14px;
    }
    .playerTitle{
        font-size:24px;
    }
    h1{
        font-size:36px;
    }
    input[type="text"]{
        font-size:16px;
        padding:10px;
    }
    .toggle-label{
        font-size:20px;
    }
    .toggle-box{
        width:44px;
        height:44px;
        font-size:24px;
    }
}
</style>

</head>

<body>

<div class="wrap">

<h1>🏌️ Invite Players</h1>

<div class="grid3">

<div class="panel">
<h2>HOST INFORMATION</h2>
<label>Host Name</label>
<input type="text" id="hostName">
</div>

<div class="panel">
<h2>ROUND INFORMATION</h2>
<label>Course</label>
<input type="text" id="courseName">
</div>

<div class="panel">
<h2>GAMES</h2>
<label>Selected Games</label>
<input type="text" id="selectedGames" readonly>
</div>

</div>

<div class="playerRow">
<div class="playerTitle">PLAYER 1</div>
<div><label>Name</label><input type="text"></div>
<div><label>Phone Number</label><input type="text"></div>
</div>

<div class="playerRow">
<div class="playerTitle">PLAYER 2</div>
<div><label>Name</label><input type="text"></div>
<div><label>Phone Number</label><input type="text"></div>
</div>

<div class="playerRow">
<div class="playerTitle">PLAYER 3</div>
<div><label>Name</label><input type="text"></div>
<div><label>Phone Number</label><input type="text"></div>
</div>

<!-- ADD GOLFERS TOGGLE -->
<div class="toggle-row" onclick="toggleExtra()">
    <div class="toggle-box" id="extraBox">＋</div>
    <div class="toggle-label">Add Golfers 4–7</div>
</div>

<div id="extra">
<div class="playerRow">
<div class="playerTitle">PLAYER 4</div>
<div><label>Name</label><input type="text"></div>
<div><label>Phone Number</label><input type="text"></div>
</div>

<div class="playerRow">
<div class="playerTitle">PLAYER 5</div>
<div><label>Name</label><input type="text"></div>
<div><label>Phone Number</label><input type="text"></div>
</div>

<div class="playerRow">
<div class="playerTitle">PLAYER 6</div>
<div><label>Name</label><input type="text"></div>
<div><label>Phone Number</label><input type="text"></div>
</div>

<div class="playerRow">
<div class="playerTitle">PLAYER 7</div>
<div><label>Name</label><input type="text"></div>
<div><label>Phone Number</label><input type="text"></div>
</div>
</div>

<!-- REMEMBER GOLFERS TOGGLE -->
<div class="toggle-row" onclick="toggleRemember()">
    <div class="toggle-box" id="rememberBox">＋</div>
    <div class="toggle-label">Remember These Golfers</div>
</div>

<button>SEND INVITES</button>

</div>

<script>
// Auto-populate Selected Games from localStorage
window.addEventListener("DOMContentLoaded", function() {
    const savedGames = JSON.parse(localStorage.getItem("selectedGames") || "[]");
    if (savedGames.length > 0) {
        document.getElementById("selectedGames").value = savedGames.join(", ");
    }

    const savedCourse = localStorage.getItem("selectedCourse");
    if (savedCourse) {
        document.getElementById("courseName").value = savedCourse;
    }
});

function toggleExtra() {
    const box = document.getElementById("extraBox");
    const extra = document.getElementById("extra");
    const isOn = box.classList.toggle("on");
    box.textContent = isOn ? "✓" : "＋";
    extra.style.display = isOn ? "block" : "none";
}

function toggleRemember() {
    const box = document.getElementById("rememberBox");
    const isOn = box.classList.toggle("on");
    box.textContent = isOn ? "✓" : "＋";
}
</script>

</body>
</html>
