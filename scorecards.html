<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birdie Bookie Scorecard</title>

<style>

body{
    margin:0;
    background:#00150f;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
    border-bottom:3px solid #00ff88;
}

h1{
    color:#00ff88;
    margin:0;
    font-size:42px;
}

.wrapper{
    overflow-x:auto;
    padding:20px;
}

table{
    border-collapse:collapse;
    min-width:2200px;
    width:100%;
}

th{
    background:#00291f;
    color:#fff;
    padding:14px;
    border:1px solid #1f4d3c;
    font-size:18px;
}

td{
    border:1px solid #1f4d3c;
    padding:10px;
    text-align:center;
}

.player-name{
    min-width:140px;
    color:#00ff88;
    font-weight:bold;
    font-size:22px;
    background:#001b15;
}

input{
    width:45px;
    height:40px;
    background:#111;
    color:#00ff88;
    border:1px solid #444;
    border-radius:8px;
    text-align:center;
    font-size:18px;
}

.total{
    color:#00ff88;
    font-size:22px;
    font-weight:bold;
}

.action-row{
    background:#021d17;
    color:#777;
    font-size:14px;
}

.action-cell{
    padding:12px;
}

footer{
    text-align:center;
    padding:20px;
    color:#666;
}

</style>
</head>

<body>

<header>
    <h1>⛳ Birdie Bookie Scorecard</h1>
</header>

<div class="wrapper">

<table>

<thead>

<tr>
<th>Player</th>

<th>1</th>
<th>2</th>
<th>3</th>
<th>4</th>
<th>5</th>
<th>6</th>
<th>7</th>
<th>8</th>
<th>9</th>

<th>OUT</th>

<th>10</th>
<th>11</th>
<th>12</th>
<th>13</th>
<th>14</th>
<th>15</th>
<th>16</th>
<th>17</th>
<th>18</th>

<th>IN</th>
<th>TOTAL</th>

</tr>

</thead>

<tbody id="scoreBody">

</tbody>

</table>

</div>

<footer>
Birdie Bookie © 2026
</footer>

<script>

const players = [
    "Player 1",
    "Player 2",
    "Player 3",
    "Player 4",
    "Player 5",
    "Player 6",
    "Player 7",
    "Player 8",
    "Player 9",
    "Player 10"
];

const scoreBody = document.getElementById("scoreBody");

players.forEach((player, playerIndex) => {

    let row = document.createElement("tr");

    let playerCell = document.createElement("td");
    playerCell.className = "player-name";
    playerCell.contentEditable = true;
    playerCell.innerText = player;

    row.appendChild(playerCell);

    let frontInputs = [];
    let backInputs = [];

    for(let i=1;i<=18;i++){

        let td = document.createElement("td");

        let input = document.createElement("input");
        input.type = "number";
        input.min = "1";

        td.appendChild(input);

        row.appendChild(td);

        if(i <= 9){
            frontInputs.push(input);
        } else {
            backInputs.push(input);
        }

        if(i === 9){

            let outTd = document.createElement("td");
            outTd.className = "total";
            outTd.innerText = "0";

            row.appendChild(outTd);

            frontInputs.forEach(input => {
                input.addEventListener("input", () => {

                    let total = 0;

                    frontInputs.forEach(box => {
                        total += Number(box.value) || 0;
                    });

                    outTd.innerText = total;

                    updateGrandTotal();
                });
            });

        }

    }

    let inTd = document.createElement("td");
    inTd.className = "total";
    inTd.innerText = "0";

    row.appendChild(inTd);

    let grandTd = document.createElement("td");
    grandTd.className = "total";
    grandTd.innerText = "0";

    row.appendChild(grandTd);

    function updateGrandTotal(){

        let front = 0;
        let back = 0;

        frontInputs.forEach(box => {
            front += Number(box.value) || 0;
        });

        backInputs.forEach(box => {
            back += Number(box.value) || 0;
        });

        inTd.innerText = back;

        grandTd.innerText = front + back;
    }

    backInputs.forEach(input => {
        input.addEventListener("input", updateGrandTotal);
    });

    scoreBody.appendChild(row);

    let actionRow = document.createElement("tr");
    actionRow.className = "action-row";

    let actionCell = document.createElement("td");
    actionCell.colSpan = "23";
    actionCell.className = "action-cell";

    actionCell.innerText =
        "Reserved Left Right Action Line";

    actionRow.appendChild(actionCell);

    scoreBody.appendChild(actionRow);

});

</script>

</body>
</html>
