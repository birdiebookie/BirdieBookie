<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birdie Bookie Invite</title>

<style>

body{
    margin:0;
    background:#00150f;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

header{
    background:#000;
    padding:25px;
    border-bottom:3px solid #00ff88;
}

h1{
    margin:0;
    color:#00ff88;
    font-size:42px;
}

.container{
    max-width:700px;
    margin:50px auto;
    padding:30px;
    background:#021d17;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,120,.2);
}

input{
    width:90%;
    padding:18px;
    margin:15px 0;
    border:none;
    border-radius:12px;
    background:#111;
    color:white;
    font-size:18px;
}

button{
    padding:18px 35px;
    background:#00aa66;
    color:white;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00cc88;
    transform:scale(1.05);
}

#output{
    margin-top:30px;
    color:#00ff88;
    font-size:20px;
    word-wrap:break-word;
}

footer{
    margin-top:60px;
    color:#666;
}

</style>
</head>

<body>

<header>
<h1>⛳ Invite Your Golf Crew</h1>
</header>

<div class="container">

<h2>Create Round Invite</h2>

<input type="text" id="course" placeholder="Golf Course Name">

<input type="date" id="date">

<input type="time" id="time">

<button onclick="generateInvite()">
Generate Invite
</button>

<div id="output"></div>

</div>

<footer>
Birdie Bookie © 2026
</footer>

<script>

function generateInvite(){

    let course =
        document.getElementById("course").value;

    let date =
        document.getElementById("date").value;

    let time =
        document.getElementById("time").value;

    let inviteLink =
        "🏌️ Join our Birdie Bookie round at "
        + course +
        " on " +
        date +
        " at " +
        time +
        "!";

    document.getElementById("output").innerHTML =
        inviteLink;
}

</script>

</body>
</html>
