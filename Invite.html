<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Invite Players - BirdieBookie</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    color:#00ff99;
    font-size:58px;
    margin-bottom:10px;
}

.sub{
    color:#cccccc;
    margin-bottom:35px;
    font-size:20px;
}

.player-box{
    background:#111;
    border:2px solid #00ff99;
    border-radius:18px;
    padding:20px;
    margin-bottom:18px;
}

.player-box input{
    width:90%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    background:#222;
    color:white;
}

.send-btn{
    margin-top:25px;
    background:#00cc77;
    border:none;
    color:white;
    padding:18px 45px;
    font-size:28px;
    border-radius:16px;
    cursor:pointer;
    transition:.2s;
}

.send-btn:hover{
    transform:scale(1.05);
    background:#00ff99;
}

.success{
    margin-top:25px;
    color:#00ff99;
    font-size:24px;
    display:none;
}

.link-box{
    margin-top:20px;
    background:#111;
    padding:15px;
    border-radius:12px;
    word-wrap:break-word;
    display:none;
}

.copy-btn{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00cc77;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>⛳ Invite Players</h1>

<div class="sub">
Send your golf crew the round invite.
</div>

<div class="player-box">
    <h2>Player 1</h2>
    <input type="text" id="p1" placeholder="Enter player name">
</div>

<div class="player-box">
    <h2>Player 2</h2>
    <input type="text" id="p2" placeholder="Enter player name">
</div>

<div class="player-box">
    <h2>Player 3</h2>
    <input type="text" id="p3" placeholder="Enter player name">
</div>

<button class="send-btn" onclick="sendInvite()">
Send Invite
</button>

<div class="success" id="successMsg">
✅ Invite Created!
</div>

<div class="link-box" id="linkBox">
    <div id="inviteLink"></div>

    <button class="copy-btn" onclick="copyInvite()">
        Copy Invite Link
    </button>
</div>

</div>

<script>

function sendInvite(){

    const p1 = document.getElementById('p1').value;
    const p2 = document.getElementById('p2').value;
    const p3 = document.getElementById('p3').value;

    if(!p1 || !p2 || !p3){
        alert("Please enter all 3 golfers.");
        return;
    }

    const roomCode = Math.random().toString(36).substring(2,8).toUpperCase();

    const inviteURL =
    "https://birdiebookie.com/round.html?room=" +
    roomCode +
    "&p1=" + encodeURIComponent(p1) +
    "&p2=" + encodeURIComponent(p2) +
    "&p3=" + encodeURIComponent(p3);

    document.getElementById('successMsg').style.display = 'block';

    document.getElementById('linkBox').style.display = 'block';

    document.getElementById('inviteLink').innerHTML =
    inviteURL;
}

function copyInvite(){

    const text =
    document.getElementById('inviteLink').innerText;

    navigator.clipboard.writeText(text);

    alert("Invite Link Copied!");
}

</script>

</body>
</html>
