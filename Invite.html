<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Invite Players | BirdieBookie</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0b3d0b, #145214);
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      max-width: 700px;
      margin: auto;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .button {
      display: inline-block;
      background: gold;
      color: black;
      padding: 15px 30px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
      transition: 0.3s;
    }

    .button:hover {
      transform: scale(1.05);
    }

    .quote {
      margin-top: 40px;
      font-style: italic;
      color: #90ee90;
    }
  </style>
</head>

<body>

  <h1>⛳ Invite Your Golf Crew</h1>

  <div class="card">
    <p>
      BirdieBookie is built for golfers who love action,
      side games, trash talk, and winning chips.
    </p>

    <p>
      Send this page to your foursome and get the bets rolling.
    </p>

    <a class="button" href="index.html">
      Enter BirdieBookie
    </a>

    <div class="quote" id="quote"></div>
  </div>

  <script>
    const quotes = [
      "Auto-press was a terrible idea.",
      "Down 14 chips before the turn.",
      "Never trust a guy with iron covers.",
      "Par saves friendships.",
      "$2 Nassau. $97 emotional damage.",
      "Hammered the carry. Immediate regret."
    ];

    const randomQuote =
      quotes[Math.floor(Math.random() * quotes.length)];

    document.getElementById("quote").innerText = randomQuote;
  </script>

</body>
</html>
