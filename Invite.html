<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invite Players - BirdieBookie</title>
<link rel="stylesheet" href="style.css">

<style>

.invite-box{
max-width:700px;
margin:auto;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:20px;
}

.invite-box input{
width:100%;
padding:14px;
margin-top:12px;
margin-bottom:20px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-size:16px;
}

.invite-btn{
padding:16px 28px;
border:none;
border-radius:12px;
background:#44ff88;
font-weight:bold;
font-size:16px;
cursor:pointer;
width:100%;
}

.output-box{
margin-top:30px;
padding:20px;
border-radius:16px;
background:rgba(68,255,136,.08);
word-break:break-all;
display:none;
}

.output-box a{
color:#44ff88;
}

.copy-btn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#44ff88;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header class="hero">

<nav>

<div class="logo">
Birdie<span>Bookie</span>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="games.html">Games</a>
<a href="scorecards.html">Scorecards</a>
</div>

</nav>

<div class="hero-content">

<h1>📱 Invite Players</h1>

<p>
Create a live gambling round and text the group.
</p>

</div>

</header>

<section class="section">

<div class="invite-box">

<h2>Create Round</h2>

<input type="text" id="roundName" placeholder="Round Name">

<input type="text" id="player1" placeholder="Player 1">

<input type="text" id="player2" placeholder="Player 2">

<input type="text" id="player3" placeholder="Player 3">

<input type="text" id="player4" placeholder="Player 4">

<button class="invite-btn" onclick="createInvite()">
Generate Invite Link
</button>

<div class="output-box" id="outputBox">

<h3>Round Invite Link</h3>

<p id="inviteLink"></p>

<button class="copy-btn" onclick="copyInvite()">
Copy Invite Link
</button>

</div>

</div>

</section>

<footer>

<h3>BirdieBookie</h3>

<p>
Gamblers with a golfing problem
</p>

</footer>

<script>

let finalInvite = '';

function createInvite(){

const roundName =
document.getElementById('roundName').value || 'BirdieBookie Round';

const p1 =
document.getElementById('player1').value || 'Player 1';

const p2 =
document.getElementById('player2').value || 'Player 2';

const p3 =
document.getElementById('player3').value || 'Player 3';

const p4 =
document.getElementById('player4').value || 'Player 4';

const roundId =
Math.random().toString(36).substring(2,10);

finalInvite =
window.location.origin +
'/scorecards.html?' +
'round=' + encodeURIComponent(roundName) +
'&p1=' + encodeURIComponent(p1) +
'&p2=' + encodeURIComponent(p2) +
'&p3=' + encodeURIComponent(p3) +
'&p4=' + encodeURIComponent(p4);

document.getElementById('outputBox').style.display = 'block';

document.getElementById('inviteLink').innerHTML =
'<a href=\"' + finalInvite + '\">' + finalInvite + '</a>';

}

function copyInvite(){

navigator.clipboard.writeText(finalInvite);

alert('Invite link copied!');

}

</script>

</body>
</html>
