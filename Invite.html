<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirdieBookie - Invite Players</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

.wrap{
    max-width:1100px;
    margin:30px auto;
    padding:20px;
}

h1{
    color:#00ff99;
    text-align:center;
    font-size:52px;
}

.panel{
    border:2px solid #00ff99;
    border-radius:14px;
    padding:18px;
    margin-bottom:22px;
}

h2{
    color:#00ff99;
    margin:0 0 16px;
}

.grid3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:20px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:2px solid #00ff99;
    background:#111;
    color:#fff;
    font-size:18px;
    box-sizing:border-box;
}

.playerRow{
    display:grid;
    grid-template-columns:180px 1fr 1fr;
    gap:18px;
    align-items:center;
    border:2px solid #00ff99;
    border-radius:12px;
    padding:18px;
    margin:16px 0;
}

.playerTitle{
    font-size:30px;
    color:#00ff99;
    font-weight:bold;
}

.check{
    font-size:22px;
    margin:24px 0;
}

#extra{
    display:none;
}

button{
    width:100%;
    padding:18px;
    font-size:30px;
    font-weight:bold;
    background:#00ff99;
    color:#000;
    border:none;
    border-radius:12px;
    cursor:pointer;
}
</style>

<script>
function toggleExtra(cb){
    document.getElementById("extra").style.display =
        cb.checked ? "block" : "none";
}
</script>

</head>

<body>

<div class="wrap">

<h1>🏌️ Invite Players</h1>

<div class="grid3">

<div class="panel">
<h2>HOST INFORMATION</h2>

<label>Host Name</label>
<input type="text">

</div>

<div class="panel">

<h2>ROUND INFORMATION</h2>

<label>Course</label>
<input type="text">

</div>

<div class="panel">

<h2>GAMES</h2>

<label>Selected Games</label>
<input type="text" readonly>

</div>

</div>
<div class="playerRow">

<div class="playerTitle">
PLAYER 1
</div>

<div>
<label>Name</label>
<input type="text">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

</div>


<div class="playerRow">

<div class="playerTitle">
PLAYER 2
</div>

<div>
<label>Name</label>
<input type="text">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

</div>


<div class="playerRow">

<div class="playerTitle">
PLAYER 3
</div>

<div>
<label>Name</label>
<input type="text">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

</div>


<div class="check">

<label>

<input
type="checkbox"
onchange="toggleExtra(this)">

Add Golfers 4–7

</label>

</div>


<div id="extra">


<div class="playerRow">

<div class="playerTitle">
PLAYER 4
</div>

<div>
<label>Name</label>
<input type="text">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

</div>


<div class="playerRow">

<div class="playerTitle">
PLAYER 5
</div>

<div>
<label>Name</label>
<input type="text">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

</div>

    <div class="playerRow">

<div class="playerTitle">
PLAYER 6
</div>

<div>
<label>Name</label>
<input type="text">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

</div>


<div class="playerRow">

<div class="playerTitle">
PLAYER 7
</div>

<div>
<label>Name</label>
<input type="text">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

</div>

</div>


<div class="check">

<label>

<input type="checkbox">

Remember These Golfers

</label>

</div>


<button>

SEND INVITES

</button>


</div>
</body>
</html>
