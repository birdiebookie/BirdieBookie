<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invite Players</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
    width:90%;
    max-width:600px;
    text-align:center;
    margin:auto;
    padding-top:80px;
}

.sub{
    color:#cccccc;
    margin-bottom:35px;
    font-size:22px;
}

.player{
    margin-bottom:20px;
}

.player input{
    width:100%;
    padding:18px;
    font-size:22px;
    border-radius:14px;
    border:2px solid #00ff99;
    background:#111;
    color:white;
    box-sizing:border-box;
}

.create-btn{
    margin-top:20px;
    background:#00cc77;
    color:white;
    border:none;
    padding:20px 50px;
    font-size:30px;
    border-radius:18px;
    cursor:pointer;
}

.create-btn:hover{
    background:#00ff99;
}

#inviteArea{
    margin-top:40px;
    display:none;
}

#inviteLink{
    background:#111;
    border:2px solid #00ff99;
    padding:18px;
    border-radius:14px;
    font-size:18px;
    word-wrap:break-word;
    margin-bottom:20px;
}

.copy-btn{
    background:#222;
    color:white;
    border:none;
    padding:14px 30px;
    font-size:20px;
    border-radius:14px;
    cursor:pointer;
}

.copy-btn:hover{
    background:#444;
}

</style>

</head>

<body>

<div class="container">

<h1>⛳ Invite Players</h1>

<div class="sub">
Enter 1, 2, 3, or 4 golfers
</div>

<div class="player">
<input type="text" id="p1" placeholder="Player 1">
</div>

<div class="player">
<input type="text" id="p2" placeholder="Player 2">
</div>

<div class="player">
<input type="text" id="p3" placeholder="Player 3">
</div>

<div class="player">
<input type="text" id="p4" placeholder="Player 4">
</div>

<button class="create-btn" onclick="createInvite()">
Create Invite
</button>

<div id="inviteArea">

<h2 style="color:#00ff99;">
Invite Ready
</h2>

<div id="inviteLink"></div>

<button class="copy-btn" onclick="copyInvite()">
Copy Invite Link
</button>

</div>

</div>

<script>

function createInvite(){

    let p1 =
    document.getElementById("p1").value.trim();

    let p2 =
    document.getElementById("p2").value.trim();

    let p3 =
    document.getElementById("p3").value.trim();

    let p4 =
    document.getElementById("p4").value.trim();

    let players = [];

    if(p1 !== "") players.push(p1);
    if(p2 !== "") players.push(p2);
    if(p3 !== "") players.push(p3);
    if(p4 !== "") players.push(p4);

    if(players.length < 1){

        alert("Enter at least 1 golfer");

        return;
    }

    let roomCode =
    Math.random().toString(36)
    .substring(2,8)
    .toUpperCase();

    let invite =
    "https://birdiebookie.com/scorecards.html?room="
    + roomCode;

    players.forEach((player,index)=>{

        invite +=
        "&p" + (index + 1) + "="
        + encodeURIComponent(player);

    });

    document.getElementById("inviteArea")
    .style.display = "block";

    document.getElementById("inviteLink")
    .innerHTML = invite;
}

function copyInvite(){

    let text =
    document.getElementById("inviteLink")
    .innerText;

    navigator.clipboard.writeText(text);

    alert("Invite copied!");
}

</script>

</body>

</html>
