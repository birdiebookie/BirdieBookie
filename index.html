<!DOCTYPE html>
<html>
<head>
  <title>BirdieBookie</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .hero {
      padding: 80px 20px;
      background: #111;
    }

    h1 {
      font-size: 64px;
      color: #00ff99;
    }

    .subtitle {
      font-size: 28px;
      margin-bottom: 40px;
    }

    .button {
      display: inline-block;
      margin: 10px;
      padding: 15px 30px;
      background: #00ff99;
      color: black;
      text-decoration: none;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
    }

    .section {
      padding: 60px 20px;
    }

    .game-box {
      background: #1a1a1a;
      margin: 15px auto;
      padding: 20px;
      border-radius: 14px;
      max-width: 500px;
      font-size: 28px;
    }

    footer {
      padding: 40px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>BirdieBookie</h1>

  <div class="subtitle">
    Gamblers with a golfing problem
  </div>

  <a class="button" href="#games">Games</a>
  <a class="button" href="#calculators">Calculators</a>
  <a class="button" href="#scorecards">Scorecards</a>
</div>

<div class="section" id="games">
  <h2>Featured Games</h2>

  <div class="game-box">🐺 Wolf</div>
  <div class="game-box">💰 Nassau</div>
  <div class="game-box">⛳ Skins</div>
  <div class="game-box">😈 Leftist</div>
  <div class="game-box">🔥 Hammer</div>
</div>

<div class="section" id="calculators">
  <h2>Calculators</h2>

  <div class="game-box">🧮 Nassau Calculator</div>
  <div class="game-box">📊 Skins Calculator</div>
</div>

<div class="section" id="scorecards">
  <h2>Scorecards</h2>

  <div class="game-box">📱 Wolf Scorecard</div>
  <div class="game-box">🎯 Skins Tracker</div>
</div>

<footer>
  More degeneracy coming soon.
</footer>

</body>
</html>
